<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión · LexiQuest</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>
<body class="d-flex align-items-center">
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <div class="decor-dot"></div>
    <!-- Resto del contenido... -->   

    <div class="container py-4">
        <!-- BARRA SUPERIOR -->
        <div class="top-bar d-flex flex-wrap align-items-center justify-content-between">
            <span class="brand-title"></i>LexiQuest</span>
            <button class="btn btn-registro" id="registerTopBtn"><i class="far fa-user me-2"></i>Registrarse</button>
        </div>

        <!-- CUERPO PRINCIPAL -->
        <div class="content-wrapper">
            <div class="row g-5 align-items-center">
                <!-- COLUMNA IZQUIERDA: imagen -->
                <div class="col-md-6 text-center text-md-start">
                    <img src="{{ url_for('static', filename='images/login.png') }}" alt="Ilustración del inicio" class="left-image img-fluid" style="max-height: 380px;">
                </div>

                <!-- COLUMNA DERECHA: formulario -->
                <div class="col-md-6">
                    <div class="glass-card p-4 p-xl-5">
                        <div class="descripcion mb-4">
                            <i class="fas fa-chart-line me-2" style="color:#1b2f4f;"></i> 
                            Mejora tu vocabulario en inglés ahora.
                        </div>

                        <form class="mt-3" id="loginForm" action="/login" method="POST">
                            <div class="mb-4">
                                <input type="text" name="nombre" class="form-control form-control-custom" id="usuario" placeholder="Usuario" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" name="password" class="form-control form-control-custom" id="password" placeholder="Contraseña" required>
                            </div>
                            <button type="submit" class="btn btn-iniciar mb-4">
                                <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión
                            </button>
                        </form>

                        <div class="registro-link text-center mt-3">
                            <span>¿No tienes cuenta?</span>
                            <a class="link-registro" id="registerBottomLink">Regístrate</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE REGISTRO -->
    <div class="modal-overlay" id="registroModal">
        <div class="modal-window">
            <div class="modal-content-custom">
                <div class="modal-header-custom d-flex justify-content-between align-items-center">
                    <h3 class="modal-title-custom m-0">
                        <i class="fas fa-user-plus me-2" style="color: #1b2f4f;"></i>Registro
                    </h3>
                    <button class="btn-close-custom" id="closeModalBtn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div class="modal-body-custom">
                    <form id="registerForm" action="/register" method="POST">
                        <div class="mb-4">
                            <label for="usuarioUnico" class="form-label fw-semibold text-secondary mb-2">
                                <i class="fas fa-user me-2"></i>Usuario Único
                            </label>
                            <input type="text" name="nombre" class="form-control form-control-custom" id="usuarioUnico" placeholder="Elige un nombre de usuario" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="contrasenaRegistro" class="form-label fw-semibold text-secondary mb-2">
                                <i class="fas fa-lock me-2"></i>Contraseña
                            </label>
                            <input type="password" name="password" class="form-control form-control-custom" id="contrasenaRegistro" placeholder="Crea una contraseña segura" required>
                        </div>
                        
                        <button type="submit" class="btn btn-registro-modal mt-3">
                            <i class="fas fa-check-circle me-2"></i>Crear cuenta
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
